version: '3.8'

services:
  # CALM Hub - Architecture validation service
  calm-hub:
    image: finos/calm-hub:latest
    ports:
      - "3000:3000"
    environment:
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongo:27017
      QUARKUS_OIDC_CLIENT_ID: calm-hub
      QUARKUS_OIDC_CLIENT_SECRET: secret123
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/auth/realms/calm
    depends_on:
      - mongo
      - keycloak
    networks:
      - calm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - CALM Hub data store
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
    networks:
      - calm-network

  # Keycloak - OAuth 2.0 / OIDC provider
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KC_FEATURES: token_exchange,transient_users
      KC_PROXY: passthrough
      KC_HOSTNAME_STRICT_HTTPS: "false"
    command: 
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json
    depends_on:
      - postgres
    networks:
      - calm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - Keycloak database
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - calm-network

networks:
  calm-network:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
